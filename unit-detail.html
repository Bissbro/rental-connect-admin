<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Unit Details</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root { --navy:#0A2540; --teal:#40B5AD; --gold:#B8975A; --charcoal:#1C1C1E; --warm-white:#FAFAF8; --muted:#6b7280; --line:#E8E8E4; --card:#FFFFFF; --danger:#E15B5B; --r:16px; --shadow:0 2px 12px rgba(10,37,64,0.07); }
* { margin:0; padding:0; box-sizing:border-box; }
html { -webkit-text-size-adjust:100%; }
body { font-family:'Inter',sans-serif; color:var(--charcoal); background:var(--warm-white); font-size:16px; line-height:1.6; }

/* Currency toggle bar */
.curr-bar { background:var(--navy); padding:6px 16px; display:flex; align-items:center; gap:8px; position:sticky; top:0; z-index:70; }
.curr-tab { display:flex; align-items:center; gap:7px; padding:7px 16px; border-radius:20px; font-size:14px; font-weight:600; color:rgba(255,255,255,0.65); cursor:pointer; border:none; background:transparent; min-height:38px; }
.curr-tab.active { background:white; color:var(--navy); }
.curr-bar[data-mode="mvr_only"] #tab-foreign { display:none; }
.curr-bar[data-mode="usd_only"] #tab-local { display:none; }
.curr-back { margin-left:auto; color:white; font-size:18px; background:none; border:none; cursor:pointer; min-width:44px; min-height:44px; }

/* Gallery */
.gallery-container { position:relative; width:100%; aspect-ratio:4/3; max-height:480px; overflow:hidden; background:var(--line); }
.gallery-slide { position:absolute; inset:0; opacity:0; transition:opacity .3s ease; }
.gallery-slide.active { opacity:1; }
.gallery-slide img { width:100%; height:100%; object-fit:cover; }
.gallery-nav { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.92); border:none; width:44px; height:44px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; color:var(--navy); z-index:10; box-shadow:var(--shadow); }
.gallery-nav:active { transform:translateY(-50%) scale(0.94); }
.gallery-nav.prev { left:16px; } .gallery-nav.next { right:16px; }
.gallery-counter { position:absolute; bottom:16px; right:16px; background:rgba(10,37,64,0.75); color:white; padding:5px 12px; border-radius:20px; font-size:13px; font-weight:600; z-index:10; }
.gallery-unit-badge { position:absolute; bottom:16px; left:16px; background:rgba(10,37,64,0.75); color:white; padding:5px 12px; border-radius:20px; font-size:13px; font-weight:700; z-index:10; letter-spacing:0.5px; }

/* Content */
.content { max-width:1100px; margin:0 auto; padding:16px 20px 110px; }
.prop-name { text-align:center; font-size:13px; letter-spacing:3px; text-transform:uppercase; color:var(--teal); font-weight:700; margin-bottom:8px; }
.unit-title { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--navy); text-align:center; margin-bottom:12px; line-height:1.2; }
.offer-badge { background:var(--gold); color:white; font-size:12px; font-weight:700; padding:5px 12px; border-radius:6px; display:inline-block; margin-bottom:12px; }
.section-h { font-size:12px; font-weight:800; color:var(--navy); text-transform:uppercase; letter-spacing:2px; margin:32px 0 14px; }

/* Specs table */
.specs-table { border-top:1px solid var(--line); }
.spec-row { display:flex; align-items:center; gap:12px; padding:11px 4px; border-bottom:1px solid var(--line); font-size:15px; }
.spec-row i { color:var(--teal); width:22px; text-align:center; font-size:16px; }
.spec-label { font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:var(--navy); width:92px; flex-shrink:0; }
.spec-value { color:var(--charcoal); font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.spec-value .sep { color:var(--muted); margin:0 6px; }

/* Description */
.unit-desc { font-size:16px; line-height:1.7; color:var(--charcoal); }
.desc-wrap.collapsed .unit-desc { max-height:150px; overflow:hidden; -webkit-mask-image:linear-gradient(180deg,#000 60%,transparent); mask-image:linear-gradient(180deg,#000 60%,transparent); }
.show-more-btn { display:block; width:100%; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:13px; font-size:15px; font-weight:600; color:var(--navy); cursor:pointer; margin-top:12px; min-height:44px; }
.show-more-btn:active { background:var(--line); }

/* Amenities */
.amenities-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.amenity-pill { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 14px; font-size:14px; color:var(--charcoal); display:flex; align-items:center; gap:10px; min-height:64px; line-height:1.35; }
.amenity-pill i { color:var(--teal); width:16px; }
.amenity-pill.hidden-extra { display:none; }
.amenities-wrap.expanded .amenity-pill.hidden-extra { display:flex; }

/* Price + booking card */
.price-card { background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:24px 20px; box-shadow:var(--shadow); margin-top:32px; }
.price-headline { display:none; font-family:'Playfair Display',serif; font-size:2rem; color:var(--navy); font-weight:700; }
.price-headline span { font-size:15px; color:var(--muted); font-weight:400; font-family:'Inter',sans-serif; }
.direct-badge { display:inline-block; background:var(--teal); color:white; font-size:11px; font-weight:800; letter-spacing:1.5px; padding:5px 14px; border-radius:16px; margin:10px 0 18px; text-transform:uppercase; }

/* Calendar (inside price card) */
.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.cal-nav-group { display:flex; gap:8px; }
.cal-nav { background:var(--warm-white); border:1px solid var(--line); width:44px; height:44px; border-radius:50%; cursor:pointer; color:var(--navy); font-size:14px; }
.cal-nav:active { background:var(--line); }
.cal-month-label { font-weight:700; color:var(--navy); font-size:17px; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; text-align:center; }
.cal-dow { font-size:12px; color:var(--muted); font-weight:700; padding-bottom:8px; }
.cal-day { padding:10px 0; font-size:14px; font-weight:500; border-radius:8px; cursor:pointer; min-height:40px; border:1.5px solid #DDDDD8; background:var(--card); }
.cal-day:not(.blocked):not(.past):not(.empty):active { background:var(--line); }
.cal-day.blocked { background:var(--card); color:var(--danger); cursor:not-allowed; text-decoration:line-through; }
.cal-day.past, .cal-day.past.blocked { color:#C8C8C4; background:var(--warm-white); border-color:#E4E4E0; cursor:not-allowed; text-decoration:none; }
.cal-day.empty { visibility:hidden; }
.cal-day.selected { background:var(--navy); color:white; border-color:var(--navy); font-weight:700; }
.cal-day.in-range { background:#EAF6F5; border-color:#CBE9E6; color:var(--navy); }
.cal-day.today { border:2px solid var(--teal); color:var(--teal); font-weight:700; box-shadow:0 0 0 3px rgba(64,181,173,0.25); }
.cal-day.today.blocked { color:var(--danger); text-decoration:line-through; background:var(--card); }
.cal-day.today.selected { background:var(--navy); color:white; border-color:var(--navy); box-shadow:none; }
.cal-instruction { font-size:12px; color:var(--muted); text-align:center; margin-top:12px; display:flex; align-items:center; justify-content:center; gap:6px; }

/* Date fields */
.date-inputs { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
.date-field { border:1px solid var(--line); border-radius:12px; padding:12px 14px; background:var(--warm-white); }
.date-field label { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); display:block; margin-bottom:4px; }
.date-field input { background:transparent; border:none; font-size:15px; font-weight:600; width:100%; font-family:'Inter',sans-serif; color:var(--navy); cursor:default; }
.date-field input:focus { outline:none; }

/* Booking form */
.form-row { display:flex; gap:14px; margin-bottom:16px; flex-wrap:wrap; }
.form-group { flex:1; min-width:140px; }
.form-group label { display:block; font-size:13px; font-weight:600; color:var(--navy); margin-bottom:6px; }
.form-group input, .form-group select { width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:10px; font-size:16px; font-family:inherit; color:var(--charcoal); min-height:44px; background:var(--card); }
.form-group input:focus, .form-group select:focus { outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(64,181,173,0.15); }
.price-summary { background:var(--warm-white); border:1px solid var(--line); border-radius:12px; padding:16px; margin:16px 0; display:none; }
.price-row { display:flex; justify-content:space-between; font-size:15px; padding:5px 0; color:var(--charcoal); }
.price-row.total { font-weight:700; color:var(--navy); font-size:17px; border-top:1px solid var(--line); margin-top:8px; padding-top:12px; }
.btn-submit { width:100%; background:var(--navy); color:white; padding:15px; border:none; border-radius:10px; font-weight:700; font-size:16px; cursor:pointer; margin-top:8px; min-height:48px; }
.btn-submit:active { background:#12315a; }
.trust-line { display:flex; align-items:center; justify-content:center; gap:8px; font-size:13px; color:var(--muted); margin-top:14px; }
.trust-line i { color:var(--teal); }
.success-msg { display:none; text-align:center; padding:32px 20px; }
.success-msg i { font-size:44px; color:var(--teal); margin-bottom:14px; display:block; }
.success-msg h3 { font-family:'Playfair Display',serif; font-size:1.35rem; color:var(--navy); margin-bottom:8px; }
.success-msg p { color:var(--charcoal); font-size:15px; }

/* Map */
.map-box { background:var(--card); border:1px solid var(--line); border-radius:var(--r); height:220px; display:flex; align-items:center; justify-content:center; color:var(--muted); position:relative; overflow:hidden; }
.map-box iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
.btn-directions { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); background:white; color:var(--navy); font-weight:700; font-size:14px; padding:11px 22px; border-radius:24px; text-decoration:none; box-shadow:0 3px 12px rgba(10,37,64,0.25); display:flex; align-items:center; gap:8px; z-index:2; }
.btn-directions i { color:var(--teal); }

/* Sticky price bar (mobile) */
.price-bar { position:fixed; bottom:0; left:0; right:0; background:white; border-top:2px solid var(--navy); box-shadow:0 -4px 16px rgba(10,37,64,0.12); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; z-index:60; }
.price-bar-amount { font-family:'Inter',sans-serif; font-size:1.05rem; color:var(--navy); font-weight:800; white-space:nowrap; }
.price-bar-amount span { font-size:13px; color:var(--muted); font-weight:400; font-family:'Inter',sans-serif; }
.btn-book-now { background:var(--navy); color:white; padding:13px 28px; border-radius:10px; font-weight:700; font-size:15px; border:none; cursor:pointer; text-decoration:none; min-height:44px; display:flex; align-items:center; }
.btn-book-now:active { background:#12315a; }

.loading-state, .error-state { text-align:center; padding:80px 20px; color:var(--muted); font-size:16px; }
.pkg-grid { display:grid; grid-template-columns:1fr; gap:10px; }
.pkg-card { border:2px solid var(--line); border-radius:14px; padding:16px; cursor:pointer; background:var(--card); transition:border-color 0.15s; display:flex; align-items:center; justify-content:space-between; gap:12px; }
.pkg-card.selected { border-color:var(--teal); background:#EFF9F8; }
.pkg-card:active { border-color:var(--teal); }
.pkg-left { flex:1; }
.pkg-name { font-size:15px; font-weight:700; color:var(--navy); margin-bottom:2px; }
.pkg-price { font-size:13px; color:var(--muted); }
.pkg-price strong { color:var(--teal); }
.pkg-info-btn { background:none; border:1.5px solid var(--line); border-radius:50%; width:34px; height:34px; display:flex; align-items:center; justify-content:center; color:var(--muted); cursor:pointer; flex-shrink:0; font-size:14px; }
.sheet-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; display:none; }
.sheet-overlay.open { display:block; }
.sheet { position:fixed; bottom:0; left:0; right:0; background:white; border-radius:24px 24px 0 0; z-index:2001; max-height:85vh; overflow-y:auto; transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.4,0,0.2,1); }
.sheet.open { transform:translateY(0); }
.sheet-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--line); position:sticky; top:0; background:white; z-index:1; }
.sheet-title { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; color:var(--navy); }
.sheet-close { background:none; border:none; width:32px; height:32px; font-size:14px; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; }
.sheet-body { padding:20px; }
.amenity-sheet-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.amenity-sheet-item { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 14px; font-size:14px; color:var(--charcoal); display:flex; align-items:center; gap:10px; min-height:56px; line-height:1.35; }
.amenity-sheet-item i { color:var(--teal); width:16px; }

/* Responsive */
.detail-layout { display:block; }
@media (min-width: 768px) {
  .content { max-width:760px; padding:32px 32px 120px; }
  .gallery-container { max-height:440px; }
  .amenities-grid { grid-template-columns:repeat(3,1fr); }
}
@media (min-width: 1024px) {
  .content { max-width:1100px; padding:40px 40px 60px; }
  .gallery-container { max-width:1100px; margin:0 auto; border-radius:var(--r); max-height:500px; }
  .detail-layout { display:grid; grid-template-columns:1fr 440px; gap:48px; align-items:start; }
  .detail-right { position:sticky; top:76px; }
  .price-card { margin-top:0; }
  .price-headline { display:block; }
  .price-bar { display:none; }
  .amenities-grid { grid-template-columns:repeat(2,1fr); }
  .map-box { height:300px; }
  .prop-name, .unit-title { text-align:left; }
}
</style>
</head>
<body>

<div class="curr-bar" id="curr-bar">
  <button class="curr-tab active" id="tab-local" onclick="setCurrency('MVR')"><i class="fas fa-sailboat"></i> Local</button>
  <button class="curr-tab" id="tab-foreign" onclick="setCurrency('USD')"><i class="fas fa-plane"></i> Foreign</button>
  <button class="curr-back" onclick="history.back()"><i class="fas fa-chevron-left"></i></button>
</div>

<div id="loading" class="loading-state"><i class="fas fa-circle-notch fa-spin"></i> Loading unit...</div>
<div id="error" class="error-state" style="display:none">Unit not found.</div>

<div id="unit-content" style="display:none">

  <div class="gallery-container" id="gallery-container">
    <div class="gallery-counter" id="gallery-counter">1 / 1</div>
  </div>

  <div class="content">
    <div class="prop-name" id="prop-name"></div>
    <h1 class="unit-title" id="unit-title"></h1>
    <div id="offer-badge" style="text-align:center"></div>

    <div class="detail-layout">
    <div class="detail-left">

    <div class="specs-table" id="specs-table"></div>

    <div class="section-h">Description</div>
    <div class="desc-wrap" id="desc-wrap">
      <p class="unit-desc" id="unit-description"></p>
    </div>
    <button class="show-more-btn" id="desc-more-btn" style="display:none" onclick="openDescSheet()">Show more</button>

    <div class="section-h">What This Place Offers</div>
    <div class="amenities-wrap" id="amenities-wrap">
      <div class="amenities-grid" id="amenities-grid"></div>
    </div>
    <button class="show-more-btn" id="amenities-more-btn" style="display:none" onclick="openAmenSheet()"></button>

    <div class="section-h" id="packages-section" style="display:none">Choose a Package</div>
    <div class="pkg-grid" id="pkg-grid" style="margin-bottom:16px"></div>

    <div class="section-h">Location</div>
    <div class="map-box" id="map-box">
      <div style="text-align:center"><i class="fas fa-map" style="font-size:32px;margin-bottom:8px;display:block;color:var(--teal)"></i>Loading location...</div>
    </div>

    </div>
  <div class="price-bar">
    <div class="price-bar-amount" id="price-bar-amount">—</div>
    <a href="book.html?id=8" id="book-now-link" class="btn-book-now">Book Now</a>
  </div>

</div>

<!-- Package info sheet -->
<div class="sheet-overlay" id="pkg-overlay" onclick="closePkgSheet()"></div>
<div class="sheet" id="pkg-sheet">
  <div class="sheet-handle-bar" style="height:4px;width:40px;background:var(--line);border-radius:4px;margin:12px auto 0"></div>
  <div class="sheet-header">
    <span class="sheet-title" id="pkg-sheet-title">Package Details</span>
    <button class="sheet-close" onclick="closePkgSheet()"><i class="fas fa-times"></i></button>
  </div>
  <div class="sheet-body" id="pkg-sheet-body"></div>
</div>

<!-- Description sheet -->
<div class="sheet-overlay" id="desc-overlay" onclick="closeDescSheet()"></div>
<div class="sheet" id="desc-sheet">
  <div class="sheet-header">
    <span class="sheet-title">Description</span>
    <button class="sheet-close" onclick="closeDescSheet()"><i class="fas fa-times"></i></button>
  </div>
  <div class="sheet-body" id="desc-sheet-body"></div>
</div>

<!-- Amenities sheet -->
<div class="sheet-overlay" id="amen-overlay" onclick="closeAmenSheet()"></div>
<div class="sheet" id="amen-sheet">
  <div class="sheet-header">
    <span class="sheet-title">What This Place Offers</span>
    <button class="sheet-close" onclick="closeAmenSheet()"><i class="fas fa-times"></i></button>
  </div>
  <div class="sheet-body">
    <div class="amenity-sheet-grid" id="amen-sheet-grid"></div>
  </div>
</div>

<script src="/tenant.js" onerror="void(0)"></script>
<script>
// Resolve tenant from slug (set by tenant.js or URL param)
const _slug = (window.RC_TENANT_SLUG) || new URLSearchParams(location.search).get('tenant') || 'coral';
const API = 'https://api.htmrentals.com';
let TENANT_ID = 0;
async function resolveTenantId() {
  const r = await fetch(`${API}/api/public/resolve/${_slug}`);
  const d = await r.json();
  if (d.success) TENANT_ID = d.tenant_id;
}

let unitData = null;
let packagesData = [];
let selectedPkgId = '0';
let selectedPkgName = 'Room Only';
let selectedPkgAddon = 0;
let currency = 'MVR';
let galleryImages = [];
let currentImageIndex = 0;
let blockedRanges = [];
let calMonth = new Date();
calMonth.setDate(1);
let startDate = null;
let endDate = null;
const todayStr = new Date().toISOString().split('T')[0];

const amenityIcons = [
  ['washing machine', 'fa-rotate'],
  ['muslim shower', 'fa-shower'],
  ['hot shower', 'fa-hot-tub-person'],
  ['shower', 'fa-shower'],
  ['air condition', 'fa-snowflake'],
  ['refrigerator', 'fa-temperature-arrow-down'],
  ['fridge', 'fa-temperature-arrow-down'],
  ['hair dryer', 'fa-wind'],
  ['hair', 'fa-wind'],
  ['iron', 'fa-shirt'],
  ['washer', 'fa-rotate'],
  ['laundry', 'fa-rotate'],
  ['wifi', 'fa-wifi'],
  ['tv', 'fa-tv'],
  ['kitchen', 'fa-utensils'],
  ['microwave', 'fa-bowl-food'],
  ['kettle', 'fa-mug-hot'],
  ['breakfast', 'fa-mug-hot'],
  ['parking', 'fa-square-parking'],
  ['security', 'fa-shield-halved'],
  ['pool', 'fa-water'],
  ['balcony', 'fa-door-open'],
  ['linen', 'fa-bed'],
  ['towel', 'fa-scroll'],
  ['desk', 'fa-laptop'],
  ['wardrobe', 'fa-shirt'],
  ['closet', 'fa-shirt'],
  ['housekeeping', 'fa-broom'],
  ['cleaning', 'fa-broom'],
  ['smoke', 'fa-fire-extinguisher'],
  ['first aid', 'fa-kit-medical'],
  ['safe', 'fa-lock'],
  ['elevator', 'fa-elevator'],
  ['gym', 'fa-dumbbell'],
];
function iconFor(name) {
  const lower = name.toLowerCase();
  const match = amenityIcons.find(([k]) => lower.includes(k));
  return match ? match[1] : 'fa-circle-check';
}

function getUnitId() {
  return new URLSearchParams(window.location.search).get('id');
}

function unitPrice() {
  if (!unitData) return 0;
  return currency === 'MVR'
    ? (unitData.base_price_mvr ? parseFloat(unitData.base_price_mvr) : 0)
    : (unitData.base_price_usd ? parseFloat(unitData.base_price_usd) : 0);
}
function fmtMoney(amt) {
  return currency === 'MVR' ? `MVR ${amt.toLocaleString()}` : `$${amt.toLocaleString()}`;
}

function updateBookLink() {
  const _bl=document.getElementById("book-now-link");
  if(_bl){
    const _uid=new URLSearchParams(location.search).get("id");
    if(_uid) _bl.href="book.html?id="+_uid+"&cur="+currency+"&pkg_id="+selectedPkgId+"&pkg_name="+encodeURIComponent(selectedPkgName);
  }
}

function setCurrency(c) {
  currency = c;
  document.getElementById('tab-local').classList.toggle('active', c === 'MVR');
  document.getElementById('tab-foreign').classList.toggle('active', c === 'USD');
  const nidRow = document.getElementById('nid-row'); if(nidRow) nidRow.style.display = c === 'MVR' ? 'flex' : 'none';
  renderPricing();
  if (packagesData.length) { selectedPkgAddon = 0; selectedPkgId = "0"; selectedPkgName = "Room Only"; renderPackages(); updatePriceBar(); }
  const _bl = document.getElementById('book-now-link');
  if (_bl) { const _uid = new URLSearchParams(location.search).get('id'); if(_uid) _bl.href = 'book.html?id=' + _uid + '&cur=' + c; }
}

function populateGuestDropdowns(u) {
  const adultsSel = document.getElementById('b-adults');
  if (!adultsSel) return;
  const maxAdults = u.max_adults || u.max_guests || 2;
  adultsSel.innerHTML = '';

  }
  updateChildrenOptions();
}
function updateChildrenOptions() {
  if (!document.getElementById('b-adults')) return;
  const u = unitData;
  const maxTotal = u.max_guests || 2;
  const maxChildren = u.max_children || 0;
  const adults = parseInt(document.getElementById('b-adults').value) || 1;
  const allowed = Math.max(0, Math.min(maxChildren, maxTotal - adults));
  const sel = document.getElementById('b-children');
  const current = parseInt(sel.value) || 0;
  sel.innerHTML = '<option value="0">0 children</option>';
  for (let i = 1; i <= allowed; i++) {
    sel.innerHTML += `<option value="${i}">${i} child${i>1?'ren':''}</option>`;
  }
  sel.value = current <= allowed ? current : 0;
}

  `).join('') + (badge ? `<div class="gallery-unit-badge">${badge}</div>` : '') + `<div class="gallery-counter" id="gallery-counter">1 / ${galleryImages.length}</div>`;

function initSwipe(container) {
  let startX = 0;
  container.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive:true});
  container.addEventListener('touchend', e => {
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) { if (diff > 0) nextImage(); else prevImage(); }
  }, {passive:true});
}

function updateGalleryImage() {
  document.querySelectorAll('.gallery-slide').forEach((s, i) => s.classList.toggle('active', i === currentImageIndex));
  const counter = document.getElementById('gallery-counter');
  if (counter) counter.textContent = `${currentImageIndex + 1} / ${galleryImages.length}`;
}
function nextImage() { currentImageIndex = (currentImageIndex + 1) % galleryImages.length; updateGalleryImage(); }
function prevImage() { currentImageIndex = (currentImageIndex - 1 + galleryImages.length) % galleryImages.length; updateGalleryImage(); }

async function loadCalendar(unitId) {
  try {
    const r = await fetch(`${API}/api/public/${TENANT_ID}/units/${unitId}/availability`);
    const d = await r.json();
    blockedRanges = (d.blocked_ranges || []).map(rg => ({
      start: new Date(rg.start).toISOString().split('T')[0],
      end: new Date(rg.end).toISOString().split('T')[0]
    }));
    renderCalendar();
  } catch(e) { console.error('Failed to load availability', e); }
}
function isDateBooked(dateStr) {
  return blockedRanges.some(r => dateStr >= r.start && dateStr < r.end);
}
function changeMonth(delta) {
  calMonth.setMonth(calMonth.getMonth() + delta);
  renderCalendar();
}
function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  if (!grid) return;
  const label = document.getElementById('cal-month-label');
  const year = calMonth.getFullYear();
  const month = calMonth.getMonth();
  label.textContent = calMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  let html = ['Su','Mo','Tu','We','Th','Fr','Sa'].map(d => `<div class="cal-dow">${d}</div>`).join('');
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isBooked = isDateBooked(dateStr);
    const isPast = dateStr < todayStr;
    let isSelected = false, isInRange = false;
    if (startDate && endDate) {
      if (dateStr === startDate || dateStr === endDate) isSelected = true;
      else if (dateStr > startDate && dateStr < endDate) isInRange = true;
    } else if (startDate && dateStr === startDate) isSelected = true;
    const isToday = dateStr === todayStr;
    let cls = isPast ? 'past' : '';
    if (isBooked) cls += ' blocked';
    if (isToday) cls += ' today';
    if (isSelected) cls += ' selected';
    if (isInRange) cls += ' in-range';
    const clickable = (!isPast && !isBooked);
    html += `<div class="cal-day ${cls}" ${clickable ? `onclick="selectDate('${dateStr}')"` : ''}>${d}</div>`;
  }
  grid.innerHTML = html;
}

function formatDateDisplay(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}
function setCheckinField(dateStr) {
  const el = document.getElementById('b-checkin');
  el.value = formatDateDisplay(dateStr);
  el.dataset.iso = dateStr;
}
function setCheckoutField(dateStr) {
  const el = document.getElementById('b-checkout');
  el.value = formatDateDisplay(dateStr);
  el.dataset.iso = dateStr;
}
function clearDateFields() {
  const ci = document.getElementById('b-checkin');
  const co = document.getElementById('b-checkout');
  ci.value = ''; ci.dataset.iso = '';
  co.value = ''; co.dataset.iso = '';
}

function selectDate(dateStr) {
  if (dateStr < todayStr) return;
  if (startDate === dateStr && !endDate) {
    startDate = null; endDate = null;
    clearDateFields();
    document.getElementById('price-summary').style.display = 'none';
    renderCalendar();
    return;
  }
  if (!startDate || (startDate && endDate)) {
    startDate = dateStr; endDate = null;
    const nextDay = new Date(dateStr); nextDay.setDate(nextDay.getDate() + 1);
    setCheckinField(dateStr);
    setCheckoutField(nextDay.toISOString().split('T')[0]);
    calcPrice();
    renderCalendar();
    return;
  }
  if (startDate && !endDate) {
    if (dateStr < startDate) {
      startDate = dateStr;
      const nextDay = new Date(dateStr); nextDay.setDate(nextDay.getDate() + 1);
      setCheckinField(dateStr);
      setCheckoutField(nextDay.toISOString().split('T')[0]);
      calcPrice();
    } else {
      let rangeBlocked = false;
      let checkD = new Date(startDate); checkD.setDate(checkD.getDate() + 1);
      const endD = new Date(dateStr);
      while (checkD <= endD) {
        const ds = checkD.toISOString().split('T')[0];
        if (isDateBooked(ds)) { rangeBlocked = true; break; }
        checkD.setDate(checkD.getDate() + 1);
      }
      if (rangeBlocked) {
        alert('Selected range includes unavailable dates. Please choose different dates.');
        startDate = null; endDate = null;
        clearDateFields();
        document.getElementById('price-summary').style.display = 'none';
        renderCalendar();
        return;
      }
      endDate = dateStr;
      const checkOutDate = new Date(endDate); checkOutDate.setDate(checkOutDate.getDate() + 1);
      setCheckoutField(checkOutDate.toISOString().split('T')[0]);
      calcPrice();
    }
    renderCalendar();
  }
}

function calcPrice() {
  const ci = document.getElementById('b-checkin').dataset.iso;
  const co = document.getElementById('b-checkout').dataset.iso;
  const price = unitPrice();
  if (ci && co && price) {
    const nights = Math.round((new Date(co) - new Date(ci)) / 86400000);
    if (nights > 0) {
      const total = nights * price;
      document.getElementById('ps-rate').textContent = `${fmtMoney(price)}/night`;
      document.getElementById('ps-nights').textContent = `${nights} night${nights>1?'s':''}`;
      document.getElementById('ps-total').textContent = fmtMoney(total);
      document.getElementById('price-summary').style.display = 'block';
      document.getElementById('price-bar-amount').innerHTML = `${fmtMoney(total)}<span> · ${nights} night${nights>1?'s':''}</span>`;
      return { nights, total };
    }
  }
  document.getElementById('price-summary').style.display = 'none';
  renderPricing();
  return null;
}

async function submitBooking() {
  const name = document.getElementById('b-name').value.trim();
  const phone = document.getElementById('b-phone').value.trim();
  const checkin = document.getElementById('b-checkin').dataset.iso;
  const checkout = document.getElementById('b-checkout').dataset.iso;
  if (!name || !phone || !checkin || !checkout) {
    alert('Please fill in all required fields and select your dates.');
    return;
  }
  const calc = calcPrice();
  if (!calc) { alert('Please select valid dates.'); return; }
  const adults = parseInt(document.getElementById('b-adults').value) || 1;
  const children = parseInt(document.getElementById('b-children').value) || 0;
  const nid = document.getElementById('b-nid').value.trim();
  let requests = document.getElementById('b-requests').value;
  if (currency === 'MVR' && nid) requests = `[NID: ${nid}]${requests ? ' ' + requests : ''}`;

  try {
    const r = await fetch(`${API}/api/public/${TENANT_ID}/bookings`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        guest_name: name,
        guest_phone: phone,
        guest_email: document.getElementById('b-email').value,
        unit_id: parseInt(getUnitId()),
        number_of_guests: adults + children,
        check_in_date: checkin,
        check_out_date: checkout,
        total_nights: calc.nights,
        total_amount: calc.total,
        currency: currency,
        special_requests: requests,
        booking_source: 'Website'
      })
    });
    if (!r.ok) throw new Error();
    document.getElementById('booking-form').style.display = 'none';
    document.getElementById('success-msg').style.display = 'block';
  } catch(e) {
    alert('Booking failed. Please contact us directly via WhatsApp.');
  }
}
