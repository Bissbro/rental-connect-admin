<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTM Rentals | Reports</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--navy:#0A2540;--ocean:#006994;--turquoise:#40B5AD;--gray-light:#F8F9FA;--gray-border:#E5E5E5;--gray-text:#6C757D;--success:#28a745;--warning:#ffc107;--danger:#dc3545;--radius-lg:20px;--radius-md:12px;--shadow:0 2px 12px rgba(0,0,0,0.06)}
        body{font-family:'Inter',sans-serif;background:#F0F2F5;min-height:100vh}
        .header{background:white;border-bottom:1px solid var(--gray-border);padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
        .header-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;height:60px}
        .header h1{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--navy)}
        .back-link{display:flex;align-items:center;gap:6px;color:var(--ocean);text-decoration:none;font-size:.85rem;font-weight:500;padding:6px 14px;border:1px solid var(--ocean);border-radius:40px}
        .back-link:hover{background:var(--ocean);color:white}
        .main{max-width:1200px;margin:0 auto;padding:24px 16px}
        .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
        .tab{padding:8px 16px;border:1.5px solid var(--gray-border);border-radius:40px;font-size:12px;font-weight:600;cursor:pointer;background:white;color:var(--gray-text)}
        .tab.active{background:var(--navy);color:white;border-color:var(--navy)}
        .card{background:white;border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow);margin-bottom:16px}
        .filters{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px}
        .fg{flex:1;min-width:120px}
        .fg label{display:block;font-size:11px;font-weight:600;color:var(--gray-text);margin-bottom:4px;text-transform:uppercase}
        .fg input,.fg select{width:100%;padding:8px 12px;border:1.5px solid var(--gray-border);border-radius:8px;font-size:13px;font-family:'Inter',sans-serif}
        .presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
        .preset{padding:5px 12px;border:1px solid var(--gray-border);border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:white;color:var(--gray-text)}
        .preset.active,.preset:hover{background:var(--turquoise);color:white;border-color:var(--turquoise)}
        .btn{padding:9px 20px;border:none;border-radius:40px;font-weight:600;font-size:13px;cursor:pointer}
        .btn-primary{background:var(--turquoise);color:white}
        .btn-primary:hover{background:var(--ocean)}
        .btn-secondary{background:var(--gray-light);color:var(--navy);border:1px solid var(--gray-border)}
        .sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
        .sum-card{background:white;border-radius:12px;padding:16px;box-shadow:var(--shadow);border-left:4px solid var(--turquoise)}
        .sum-card.blue{border-left-color:var(--ocean)}
        .sum-card.green{border-left-color:var(--success)}
        .sum-card.red{border-left-color:var(--danger)}
        .sum-card.orange{border-left-color:var(--warning)}
        .sum-val{font-size:1.2rem;font-weight:700;color:var(--navy)}
        .sum-lbl{font-size:10px;color:var(--gray-text);text-transform:uppercase;margin-top:2px}
        .table-wrap{overflow-x:auto}
        table{width:100%;border-collapse:collapse}
        th{padding:10px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--gray-text);text-transform:uppercase;border-bottom:2px solid var(--gray-border);background:var(--gray-light)}
        td{padding:11px 12px;font-size:13px;border-bottom:1px solid var(--gray-border)}
        tr:last-child td{border-bottom:none}
        .tfoot td{font-weight:700;background:var(--gray-light);border-top:2px solid var(--gray-border)}
        .prog{background:var(--gray-light);border-radius:10px;height:8px;overflow:hidden;flex:1}
        .prog-fill{height:100%;border-radius:10px;background:var(--turquoise)}
        .badge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
        .air{background:#FF5A5F22;color:#FF5A5F}
        .bkg{background:#00358022;color:#003580}
        .ago{background:#FF6B3522;color:#E55A00}
        .dir{background:#40B5AD22;color:#40B5AD}
        #report-content{min-height:200px}
        .loading-state{text-align:center;padding:60px;color:var(--gray-text)}
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--navy);color:white;padding:12px 24px;border-radius:40px;font-size:13px;font-weight:500;transition:transform .3s;z-index:2000;white-space:nowrap}
        .toast.show{transform:translateX(-50%) translateY(0)}
        .toast.ok{background:var(--success)}
        .toast.err{background:var(--danger)}

        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body { background: white !important; }
            .header, .tabs, #filters-card, .toast, .back-link { display: none !important; }
            .main { padding: 0 !important; max-width: 100% !important; }
            .print-header { display: block !important; }
            .card { box-shadow: none !important; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; break-inside: avoid; }
            .sum-grid { grid-template-columns: repeat(4,1fr) !important; }
            .sum-card { border-radius: 6px !important; }
            table { font-size: 11px !important; }
            th, td { padding: 7px 10px !important; }
            .btn, button { display: none !important; }
            .prog { print-color-adjust: exact; }
        }
        .print-header { display: none; padding: 20px 0 16px; border-bottom: 2px solid var(--navy); margin-bottom: 20px; }
        .print-header .ph-logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--navy); font-weight: 700; }
        .print-header .ph-logo span { color: var(--turquoise); }
        .print-header .ph-meta { font-size: 12px; color: var(--gray-text); margin-top: 4px; }
        .print-header .ph-title { font-size: 1rem; font-weight: 700; color: var(--navy); margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="header">
    <div class="header-inner">
        <h1><i class="fas fa-chart-bar" style="color:var(--turquoise);margin-right:8px"></i>Reports</h1>
        <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Dashboard</a>
    </div>
</div>
<div class="main">
    <div class="tabs">
        <button class="tab active" onclick="switchTab('revenue',this)">Revenue</button>
        <button class="tab" onclick="switchTab('expenses',this)">Expenses</button>
        <button class="tab" onclick="switchTab('cashflow',this)">Cash Flow</button>
        <button class="tab" onclick="switchTab('occupancy',this)">Occupancy</button>
        <button class="tab" onclick="switchTab('arrivals',this)">Arrivals</button>
        <button class="tab" onclick="switchTab('bookings',this)">Bookings</button>
        <button class="tab" onclick="switchTab('partners',this)">Partners</button>
        <button class="tab" onclick="switchTab('loans',this)">Loans</button>
    </div>
    <div class="card" id="filters-card">
        <div class="presets">
            <button class="preset" onclick="setPreset('today',this)">Today</button>
            <button class="preset" onclick="setPreset('week',this)">This Week</button>
            <button class="preset active" onclick="setPreset('month',this)">This Month</button>
            <button class="preset" onclick="setPreset('quarter',this)">This Quarter</button>
            <button class="preset" onclick="setPreset('year',this)">This Year</button>
            <button class="preset" onclick="setPreset('all',this)">All Time</button>
        </div>
        <div class="filters">
            <div class="fg"><label>From</label><input type="date" id="f-from"></div>
            <div class="fg"><label>To</label><input type="date" id="f-to"></div>
            <button class="btn btn-primary" onclick="generate()"><i class="fas fa-sync"></i> Generate</button>
            <button class="btn btn-secondary" onclick="exportCSV()"><i class="fas fa-download"></i> CSV</button>
            <button class="btn btn-secondary" onclick="window.print()"><i class="fas fa-print"></i> Print/PDF</button>
        </div>
    </div>
    <div class="print-header" id="print-header">
    <div class="ph-logo">HTM<span>Rentals</span></div>
    <div class="ph-title" id="ph-title">Report</div>
    <div class="ph-meta" id="ph-meta"></div>
</div>
<div id="report-content"><div class="loading-state"><i class="fas fa-spinner fa-spin" style="font-size:2rem;display:block;margin-bottom:12px;opacity:.3"></i>Loading...</div></div>
</div>
<div class="toast" id="toast"></div>
<script>
var API='https://api.htmrentals.com/api';
var currentTab='revenue';
var reportData=null;

function getToken(){return localStorage.getItem('rc_token')}
function hdrs(){return{'Authorization':'Bearer '+getToken(),'Content-Type':'application/json'}}

if(!getToken())window.location.href='index.html';

function toast(msg,type){
    var t=document.getElementById('toast');
    t.textContent=msg;
    t.className='toast show '+(type||'');
    setTimeout(function(){t.className='toast'},3000);
}

function fmt(n){return parseFloat(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtD(d){if(!d)return'—';return new Date(d.slice(0,10)+'T12:00:00').toLocaleDateString('en-US',{day:'numeric',month:'short',year:'numeric'})}
function esc(s){return(s||'').replace(/[&<>]/g,function(m){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[m]})}
function srcBadge(s){var cls=s==='Airbnb'?'air':s==='Booking.com'?'bkg':s==='Agoda'?'ago':'dir';return'<span class="badge '+cls+'">'+(s||'Direct')+'</span>'}

function setPreset(type,el){
    document.querySelectorAll('.preset').forEach(function(b){b.classList.remove('active')});
    if(el)el.classList.add('active');
    var now=new Date(),y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
    var from='',to='';
    if(type==='today'){from=to=new Date(y,m,d).toISOString().slice(0,10)}
    else if(type==='week'){var day=now.getDay();from=new Date(y,m,d-day).toISOString().slice(0,10);to=new Date(y,m,d-day+6).toISOString().slice(0,10)}
    else if(type==='month'){from=new Date(y,m,1).toISOString().slice(0,10);to=new Date(y,m+1,0).toISOString().slice(0,10)}
    else if(type==='quarter'){var q=Math.floor(m/3);from=new Date(y,q*3,1).toISOString().slice(0,10);to=new Date(y,q*3+3,0).toISOString().slice(0,10)}
    else if(type==='year'){from=y+'-01-01';to=y+'-12-31'}
    document.getElementById('f-from').value=from;
    document.getElementById('f-to').value=to;
    generate();
}

function switchTab(name,el){
    currentTab=name;
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
    el.classList.add('active');
    generate();
}

function generate(){
    var from=document.getElementById('f-from').value;
    var to=document.getElementById('f-to').value;
    var params='';
    if(from)params+='from='+from+'&';
    if(to)params+='to='+to;
    var url=API+'/admin/reports/'+currentTab+'?'+params;
    document.getElementById('report-content').innerHTML='<div class="loading-state"><i class="fas fa-spinner fa-spin" style="font-size:2rem;display:block;margin-bottom:12px;opacity:.3"></i>Loading...</div>';
    fetch(url,{headers:hdrs()})
    .then(function(r){
        if(r.status===401){localStorage.removeItem('rc_token');window.location.href='index.html';return null}
        return r.json();
    })
    .then(function(data){
        if(!data)return;
        if(!data.success){toast(data.error||'Failed','err');return}
        reportData=data;
        var from=document.getElementById('f-from').value;
        var to=document.getElementById('f-to').value;
        var period=from&&to?from+' to '+to:from?'From '+from:to?'To '+to:'All Time';
        document.getElementById('ph-title').textContent=currentTab.charAt(0).toUpperCase()+currentTab.slice(1)+' Report';
        document.getElementById('ph-meta').textContent='Period: '+period+' · Generated: '+new Date().toLocaleDateString('en-US',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
        render(data);
    })
    .catch(function(e){toast('Error: '+e.message,'err')});
}

function render(d){
    if(currentTab==='revenue')renderRevenue(d);
    else if(currentTab==='expenses')renderExpenses(d);
    else if(currentTab==='cashflow')renderCashflow(d);
    else if(currentTab==='occupancy')renderOccupancy(d);
    else if(currentTab==='arrivals')renderArrivals(d);
    else if(currentTab==='bookings')renderBookings(d);
    else if(currentTab==='partners')renderPartners(d);
    else if(currentTab==='loans')renderLoans(d);
}

function renderRevenue(d){
    var rate=d.rate||20;
    var mvr=parseFloat((d.totals.find(function(t){return t.currency==='MVR'})||{}).total||0);
    var usd=parseFloat((d.totals.find(function(t){return t.currency==='USD'})||{}).total||0);
    var usdt=parseFloat((d.totals.find(function(t){return t.currency==='USDT'})||{}).total||0);
    var approx=mvr+(usd*rate)+(usdt*rate);
    var html='<div class="sum-grid">';
    html+='<div class="sum-card blue"><div class="sum-val">MVR '+fmt(mvr)+'</div><div class="sum-lbl">MVR Received</div></div>';
    html+='<div class="sum-card green"><div class="sum-val">$ '+fmt(usd)+'</div><div class="sum-lbl">USD Received</div></div>';
    html+='<div class="sum-card orange"><div class="sum-val">USDT '+fmt(usdt)+'</div><div class="sum-lbl">USDT Received</div></div>';
    html+='<div class="sum-card"><div class="sum-val">MVR '+fmt(approx)+'</div><div class="sum-lbl">Approx Total (Rate '+rate+')</div></div>';
    html+='</div>';
    html+='<div class="card"><h3 style="margin-bottom:12px;font-size:1rem;color:var(--navy)">Revenue by Unit</h3><div class="table-wrap"><table><thead><tr><th>Unit</th><th>Currency</th><th>Amount</th><th>Count</th></tr></thead><tbody>';
    if(d.byUnit.length){d.byUnit.forEach(function(u){html+='<tr><td><strong>'+esc(u.unit_number||'—')+'</strong></td><td>'+u.currency+'</td><td><strong>'+(u.currency==='MVR'?'MVR':u.currency==='USD'?'$':'USDT')+' '+fmt(u.total)+'</strong></td><td>'+u.count+'</td></tr>'})}
    else{html+='<tr><td colspan="4" style="text-align:center;color:var(--gray-text);padding:20px">No data</td></tr>'}
    html+='</tbody></table></div></div>';
    html+='<div class="card"><h3 style="margin-bottom:12px;font-size:1rem;color:var(--navy)">Revenue by Month</h3><div class="table-wrap"><table><thead><tr><th>Month</th><th>MVR</th><th>USD</th><th>USDT</th></tr></thead><tbody>';
    var months={};
    d.byMonth.forEach(function(m){if(!months[m.month])months[m.month]={MVR:0,USD:0,USDT:0};months[m.month][m.currency]=parseFloat(m.total)});
    var mkeys=Object.keys(months);
    if(mkeys.length){mkeys.forEach(function(mo){var v=months[mo];html+='<tr><td>'+mo+'</td><td>MVR '+fmt(v.MVR)+'</td><td>$ '+fmt(v.USD)+'</td><td>USDT '+fmt(v.USDT)+'</td></tr>'})}
    else{html+='<tr><td colspan="4" style="text-align:center;color:var(--gray-text);padding:20px">No data</td></tr>'}
    html+='<tr class="tfoot"><td>TOTAL</td><td>MVR '+fmt(mvr)+'</td><td>$ '+fmt(usd)+'</td><td>USDT '+fmt(usdt)+'</td></tr>';
    html+='</tbody></table></div></div>';
    document.getElementById('report-content').innerHTML=html;
}

function renderExpenses(d){
    var html='<div class="sum-grid">';
    html+='<div class="sum-card red"><div class="sum-val">MVR '+fmt(d.grandTotal)+'</div><div class="sum-lbl">Total Expenses</div></div>';
    d.categories.forEach(function(c){if(c.total>0)html+='<div class="sum-card"><div class="sum-val">MVR '+fmt(c.total)+'</div><div class="sum-lbl">'+c.name+'</div></div>'});
    html+='</div>';
    html+='<div class="card"><h3 style="margin-bottom:12px;font-size:1rem;color:var(--navy)">By Category</h3><div class="table-wrap"><table><thead><tr><th>Category</th><th>Amount</th><th>Count</th><th>%</th></tr></thead><tbody>';
    d.categories.filter(function(c){return c.total>0}).forEach(function(c){
        var pct=d.grandTotal>0?((c.total/d.grandTotal)*100).toFixed(1):0;
        html+='<tr><td>'+c.name+'</td><td>MVR '+fmt(c.total)+'</td><td>'+c.count+'</td><td>'+pct+'%</td></tr>';
    });
    html+='<tr class="tfoot"><td>TOTAL</td><td>MVR '+fmt(d.grandTotal)+'</td><td></td><td>100%</td></tr>';
    html+='</tbody></table></div></div>';
    html+='<div class="card"><h3 style="margin-bottom:12px;font-size:1rem;color:var(--navy)">By Unit</h3><div class="table-wrap"><table><thead><tr><th>Unit</th><th>Monthly</th><th>Rent</th><th>Renovation</th><th>Total</th></tr></thead><tbody>';
    d.byUnit.forEach(function(u){
        var tot=parseFloat(u.monthly||0)+parseFloat(u.rent||0)+parseFloat(u.renovation||0);
        html+='<tr><td><strong>'+esc(u.unit_number||'—')+'</strong></td><td>MVR '+fmt(u.monthly)+'</td><td>MVR '+fmt(u.rent)+'</td><td>MVR '+fmt(u.renovation)+'</td><td><strong>MVR '+fmt(tot)+'</strong></td></tr>';
    });
    html+='</tbody></table></div></div>';
    document.getElementById('report-content').innerHTML=html;
}

function renderCashflow(d){
    var html='<div class="sum-grid">';
    html+='<div class="sum-card blue"><div class="sum-val">MVR '+fmt(d.mvrCash)+'</div><div class="sum-lbl">MVR Cash</div></div>';
    html+='<div class="sum-card green"><div class="sum-val">$ '+fmt(d.usdCash)+'</div><div class="sum-lbl">USD Cash</div></div>';
    html+='<div class="sum-card orange"><div class="sum-val">USDT '+fmt(d.usdtCash)+'</div><div class="sum-lbl">USDT Cash</div></div>';
    html+='<div class="sum-card '+(d.approxTotal>=0?'green':'red')+'"><div class="sum-val">MVR '+fmt(d.approxTotal)+'</div><div class="sum-lbl">Approx Net (Rate '+d.rate+')</div></div>';
    html+='</div>';
    html+='<div class="card"><h3 style="margin-bottom:16px;font-size:1rem;color:var(--navy)">Breakdown</h3>';
    html+='<table style="width:100%;border-collapse:collapse">';
    var rows=[
        ['MVR Revenue','MVR '+fmt(d.mvrRevenue),'',''],
        ['+ Exchanges in','MVR '+fmt(d.mvrFromExchanges),'color:var(--success)',''],
        ['- Total Expenses','MVR '+fmt(d.totalExpenses),'color:var(--danger)',''],
        ['= MVR Cash Flow','MVR '+fmt(d.mvrCash),d.mvrCash>=0?'color:var(--success)':'color:var(--danger)','font-weight:700;border-top:2px solid var(--navy)'],
        ['USD Revenue','$ '+fmt(d.usdRevenue),'',''],
        ['- USD Exchanged','$ '+fmt(d.usdExchanged),'color:var(--danger)',''],
        ['= USD Cash','$ '+fmt(d.usdCash),'','font-weight:700;border-top:2px solid var(--navy)'],
        ['USDT Revenue','USDT '+fmt(d.usdtRevenue),'',''],
        ['- USDT Exchanged','USDT '+fmt(d.usdtExchanged),'color:var(--danger)',''],
        ['= USDT Cash','USDT '+fmt(d.usdtCash),'','font-weight:700;border-top:2px solid var(--navy)'],
    ];
    rows.forEach(function(r){html+='<tr style="'+r[3]+'"><td style="padding:10px 0;'+r[2]+'">'+r[0]+'</td><td style="text-align:right;padding:10px 0;'+r[2]+'">'+r[1]+'</td></tr>'});
    html+='</table></div>';
    document.getElementById('report-content').innerHTML=html;
}

function renderOccupancy(d){
    var avgRate=d.occupancy.length?(d.occupancy.reduce(function(s,u){return s+parseFloat(u.occupancy_rate)},0)/d.occupancy.length).toFixed(1):0;
    var totalOcc=d.occupancy.reduce(function(s,u){return s+u.occupied_days},0);
    var html='<div class="sum-grid">';
    html+='<div class="sum-card blue"><div class="sum-val">'+d.total_days+'</div><div class="sum-lbl">Total Days</div></div>';
    html+='<div class="sum-card green"><div class="sum-val">'+totalOcc+'</div><div class="sum-lbl">Occupied Nights</div></div>';
    html+='<div class="sum-card"><div class="sum-val">'+avgRate+'%</div><div class="sum-lbl">Avg Occupancy</div></div>';
    html+='</div>';
    html+='<div class="card"><div class="table-wrap"><table><thead><tr><th>Unit</th><th>Occupied</th><th>Available</th><th>Rate</th></tr></thead><tbody>';
    d.occupancy.forEach(function(u){
        html+='<tr><td><strong>'+esc(u.unit_number||'—')+'</strong></td><td>'+u.occupied_days+'</td><td>'+u.available_days+'</td>';
        html+='<td><div style="display:flex;align-items:center;gap:8px;">'+u.occupancy_rate+'%<div class="prog"><div class="prog-fill" style="width:'+u.occupancy_rate+'%"></div></div></div></td></tr>';
    });
    html+='</tbody></table></div></div>';
    document.getElementById('report-content').innerHTML=html;
}

function renderArrivals(d){
    var html='<div class="card"><h3 style="margin-bottom:12px;font-size:1rem;color:var(--navy)">Arrivals ('+d.arrivals.length+')</h3><div class="table-wrap"><table><thead><tr><th>Check In</th><th>Guest</th><th>Unit</th><th>Nights</th><th>Source</th></tr></thead><tbody>';
    if(d.arrivals.length){d.arrivals.forEach(function(b){html+='<tr><td><strong>'+fmtD(b.check_in_date)+'</strong></td><td>'+esc(b.guest_name)+'<br><small style="color:var(--gray-text)">'+esc(b.guest_phone||'')+'</small></td><td>'+esc(b.unit_number||'—')+'</td><td>'+b.total_nights+'n</td><td>'+srcBadge(b.booking_source)+'</td></tr>'})}
    else{html+='<tr><td colspan="5" style="text-align:center;color:var(--gray-text);padding:20px">No arrivals</td></tr>'}
    html+='</tbody></table></div></div>';
    html+='<div class="card"><h3 style="margin-bottom:12px;font-size:1rem;color:var(--navy)">Departures ('+d.departures.length+')</h3><div class="table-wrap"><table><thead><tr><th>Check Out</th><th>Guest</th><th>Unit</th><th>Nights</th><th>Phone</th></tr></thead><tbody>';
    if(d.departures.length){d.departures.forEach(function(b){html+='<tr><td><strong>'+fmtD(b.check_out_date)+'</strong></td><td>'+esc(b.guest_name)+'</td><td>'+esc(b.unit_number||'—')+'</td><td>'+b.total_nights+'n</td><td>'+esc(b.guest_phone||'—')+'</td></tr>'})}
    else{html+='<tr><td colspan="5" style="text-align:center;color:var(--gray-text);padding:20px">No departures</td></tr>'}
    html+='</tbody></table></div></div>';
    document.getElementById('report-content').innerHTML=html;
}

function renderBookings(d){
    var t=d.totals||{};
    var html='<div class="sum-grid">';
    html+='<div class="sum-card blue"><div class="sum-val">'+(t.total_bookings||0)+'</div><div class="sum-lbl">Bookings</div></div>';
    html+='<div class="sum-card green"><div class="sum-val">'+(t.total_nights||0)+'</div><div class="sum-lbl">Total Nights</div></div>';
    html+='<div class="sum-card"><div class="sum-val">'+parseFloat(t.avg_nights||0).toFixed(1)+'</div><div class="sum-lbl">Avg Nights</div></div>';
    html+='<div class="sum-card orange"><div class="sum-val">'+(t.total_guests||0)+'</div><div class="sum-lbl">Total Guests</div></div>';
    html+='</div>';
    html+='<div class="card"><h3 style="margin-bottom:12px;font-size:1rem;color:var(--navy)">By Source</h3><div class="table-wrap"><table><thead><tr><th>Source</th><th>Bookings</th><th>Nights</th><th>Guests</th><th>Avg Nights</th></tr></thead><tbody>';
    d.bySource.forEach(function(s){html+='<tr><td>'+srcBadge(s.source)+'</td><td>'+s.count+'</td><td>'+(s.total_nights||0)+'</td><td>'+(s.total_guests||0)+'</td><td>'+(s.count>0?(parseFloat(s.total_nights||0)/s.count).toFixed(1):0)+'</td></tr>'});
    html+='</tbody></table></div></div>';
    html+='<div class="card"><h3 style="margin-bottom:12px;font-size:1rem;color:var(--navy)">By Unit</h3><div class="table-wrap"><table><thead><tr><th>Unit</th><th>Bookings</th><th>Nights</th><th>Avg</th><th>Guests</th></tr></thead><tbody>';
    d.byUnit.forEach(function(u){html+='<tr><td><strong>'+esc(u.unit_number||'—')+'</strong></td><td>'+u.bookings+'</td><td>'+(u.nights||0)+'</td><td>'+parseFloat(u.avg_nights||0).toFixed(1)+'</td><td>'+(u.guests||0)+'</td></tr>'});
    html+='</tbody></table></div></div>';
    document.getElementById('report-content').innerHTML=html;
}

function renderPartners(d){
    var totalInv=d.partners.reduce(function(s,p){return s+p.total_invested},0);
    var totalRec=d.partners.reduce(function(s,p){return s+p.total_received},0);
    var totalWith=d.partners.reduce(function(s,p){return s+p.total_withdrawn},0);
    var html='<div class="sum-grid">';
    html+='<div class="sum-card blue"><div class="sum-val">MVR '+fmt(totalInv)+'</div><div class="sum-lbl">Total Invested</div></div>';
    html+='<div class="sum-card green"><div class="sum-val">MVR '+fmt(totalRec)+'</div><div class="sum-lbl">Profit Distributed</div></div>';
    html+='<div class="sum-card orange"><div class="sum-val">MVR '+fmt(totalWith)+'</div><div class="sum-lbl">Total Withdrawn</div></div>';
    html+='</div>';
    html+='<div class="card"><div class="table-wrap"><table><thead><tr><th>Partner</th><th>Direct</th><th>Loan Contrib.</th><th>Total Invested</th><th>Profit Received</th><th>Withdrawn</th><th>Net Balance</th></tr></thead><tbody>';
    d.partners.forEach(function(p){
        var bal=p.total_invested-p.total_received-p.total_withdrawn;
        html+='<tr><td><strong>'+esc(p.name)+'</strong></td>';
        html+='<td>MVR '+fmt(p.direct_investment)+'</td>';
        html+='<td>MVR '+fmt(p.loan_contributions)+'</td>';
        html+='<td><strong>MVR '+fmt(p.total_invested)+'</strong></td>';
        html+='<td>MVR '+fmt(p.total_received)+'</td>';
        html+='<td>MVR '+fmt(p.total_withdrawn)+'</td>';
        html+='<td style="color:'+(bal>=0?'var(--success)':'var(--danger)')+'"><strong>MVR '+fmt(bal)+'</strong></td></tr>';
    });
    html+='</tbody></table></div></div>';
    document.getElementById('report-content').innerHTML=html;
}

function renderLoans(d){
    var html='<div class="card"><div class="table-wrap"><table><thead><tr><th>Loan</th><th>Total</th><th>Paid</th><th>Remaining</th><th>Progress</th></tr></thead><tbody>';
    d.loans.forEach(function(l){
        html+='<tr><td><strong>'+esc(l.loan_name)+'</strong><br><small style="color:var(--gray-text)">'+esc(l.lender_name||'')+'</small></td>';
        html+='<td>MVR '+fmt(l.total_amount)+'</td><td>MVR '+fmt(l.total_paid)+'</td><td>MVR '+fmt(l.remaining)+'</td>';
        html+='<td><div style="display:flex;align-items:center;gap:8px;">'+l.progress+'%<div class="prog"><div class="prog-fill" style="width:'+l.progress+'%;background:var(--success)"></div></div></div></td></tr>';
    });
    html+='</tbody></table></div></div>';
    document.getElementById('report-content').innerHTML=html;
}

function exportCSV(){
    if(!reportData){toast('Generate a report first','err');return}
    var csv='HTM Rentals - '+currentTab.toUpperCase()+' Report\n\n';
    if(currentTab==='revenue'){
        csv+='Unit,Currency,Amount,Count\n';
        reportData.byUnit.forEach(function(u){csv+=u.unit_number+','+u.currency+','+u.total+','+u.count+'\n'});
    }else if(currentTab==='expenses'){
        csv+='Category,Amount MVR,Count\n';
        reportData.categories.forEach(function(c){csv+=c.name+','+c.total+','+c.count+'\n'});
    }else if(currentTab==='occupancy'){
        csv+='Unit,Occupied,Available,Rate\n';
        reportData.occupancy.forEach(function(u){csv+=u.unit_number+','+u.occupied_days+','+u.available_days+','+u.occupancy_rate+'%\n'});
    }else if(currentTab==='arrivals'){
        csv+='Date,Guest,Phone,Unit,Nights,Source\n';
        reportData.arrivals.forEach(function(b){csv+=(b.check_in_date||'').slice(0,10)+','+b.guest_name+','+(b.guest_phone||'')+','+(b.unit_number||'')+','+b.total_nights+','+(b.booking_source||'Direct')+'\n'});
    }else if(currentTab==='loans'){
        csv+='Loan,Total,Paid,Remaining,Progress\n';
        reportData.loans.forEach(function(l){csv+=l.loan_name+','+l.total_amount+','+l.total_paid+','+l.remaining+','+l.progress+'%\n'});
    }
    var blob=new Blob([csv],{type:'text/csv'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download='htm-'+currentTab+'-'+new Date().toISOString().slice(0,10)+'.csv';
    a.click();URL.revokeObjectURL(url);
    toast('CSV exported','ok');
}

setPreset('month', document.querySelector('.preset.active'));
