<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTM Rentals | Petty Cash</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F0F4F8; color: #0A2540; min-height: 100vh; }
        .header { background: #0A2540; color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header a { color: white; text-decoration: none; font-size: 20px; }
        .header h1 { font-size: 18px; font-weight: 600; }
        .container { max-width: 700px; margin: 0 auto; padding: 20px 16px 100px; }

        /* Balance card */
        .balance-card { background: linear-gradient(135deg, #0A2540, #006994); border-radius: 20px; padding: 24px; margin-bottom: 16px; color: white; }
        .balance-label { font-size: 13px; opacity: 0.7; margin-bottom: 6px; }
        .balance-amount { font-size: 36px; font-weight: 800; margin-bottom: 16px; }
        .balance-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .balance-stat { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; }
        .balance-stat-label { font-size: 11px; opacity: 0.7; margin-bottom: 4px; }
        .balance-stat-value { font-size: 16px; font-weight: 700; }
        .balance-stat-value.green { color: #40B5AD; }
        .balance-stat-value.red { color: #ff6b6b; }

        /* Card */
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .card-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .card-title i { color: #40B5AD; }

        /* Transaction items */
        .txn-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
        .txn-item:last-child { border-bottom: none; }
        .txn-dot { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-right: 12px; }
        .txn-dot.in { background: #e8f5e9; color: #2e7d32; }
        .txn-dot.out { background: #ffebee; color: #c62828; }
        .txn-left { display: flex; align-items: center; flex: 1; }
        .txn-desc { font-size: 14px; font-weight: 600; }
        .txn-meta { font-size: 11px; color: #888; margin-top: 2px; }
        .txn-amount { font-size: 15px; font-weight: 700; }
        .txn-amount.in { color: #2e7d32; }
        .txn-amount.out { color: #c62828; }
        .txn-delete { background: none; border: none; color: #ddd; cursor: pointer; font-size: 13px; margin-left: 8px; }
        .txn-delete:hover { color: #dc3545; }

        /* Action buttons */
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .action-btn { padding: 14px; border-radius: 14px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; }
        .action-btn.in { background: #e8f5e9; color: #2e7d32; }
        .action-btn.out { background: #ffebee; color: #c62828; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,37,64,0.7); z-index: 9999; align-items: flex-end; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: white; border-radius: 24px 24px 0 0; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 24px 20px; }
        .modal-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 20px; }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group select { width: 100%; padding: 11px 14px; border: 1.5px solid #E0E0E0; border-radius: 10px; font-size: 14px; outline: none; font-family: inherit; }
        .form-group input:focus, .form-group select:focus { border-color: #40B5AD; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-primary { width: 100%; padding: 14px; background: #0A2540; color: white; border: none; border-radius: 40px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; font-family: inherit; }
        .btn-cancel { width: 100%; padding: 12px; background: none; border: none; color: #888; font-size: 14px; cursor: pointer; font-family: inherit; }

        .toast { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #0A2540; color: white; padding: 12px 24px; border-radius: 40px; font-size: 14px; font-weight: 600; z-index: 99999; }
        .empty { text-align: center; padding: 24px; color: #aaa; font-size: 13px; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <a href="admin.html"><i class="fas fa-arrow-left"></i></a>
        <h1>Petty Cash</h1>
    </div>
</div>

<div class="container">
    <!-- Balance -->
    <div class="balance-card">
        <div class="balance-label">Current Balance</div>
        <div class="balance-amount" id="balance">MVR 0.00</div>
        <div class="balance-stats">
            <div class="balance-stat">
                <div class="balance-stat-label">Total In</div>
                <div class="balance-stat-value green" id="total-in">MVR 0</div>
            </div>
            <div class="balance-stat">
                <div class="balance-stat-label">Total Out</div>
                <div class="balance-stat-value red" id="total-out">MVR 0</div>
            </div>
        </div>
    </div>

    <!-- Action buttons -->
    <div class="action-row">
        <button class="action-btn in" onclick="openModal('in')">
            <i class="fas fa-arrow-down"></i> Add Cash
        </button>
        <button class="action-btn out" onclick="openModal('out')">
            <i class="fas fa-arrow-up"></i> Record Expense
        </button>
    </div>

    <!-- Transactions -->
    <div class="card">
        <div class="card-title"><i class="fas fa-list"></i> Transactions</div>
        <div id="transactions-list"><div class="empty">Loading...</div></div>
    </div>
</div>

<!-- Transaction Modal -->
<div class="modal-overlay" id="txn-modal">
    <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-title" id="modal-title">Add Cash</div>
        <input type="hidden" id="txn-type">
        <div class="form-row">
            <div class="form-group">
                <label>Amount (MVR)</label>
                <input type="number" id="txn-amount" placeholder="0">
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="txn-date">
            </div>
        </div>
        <div class="form-group">
            <label>Description</label>
            <input type="text" id="txn-desc" placeholder="e.g., Contribution from A-207">
        </div>
        <div class="form-group" id="unit-group">
            <label>Unit (optional — for contributions)</label>
            <select id="txn-unit">
                <option value="">Not unit-specific</option>
            </select>
        </div>
        <button class="btn-primary" onclick="saveTransaction()">Save</button>
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://api.htmrentals.com/api';
let units = [];

function getToken() { return localStorage.getItem('rc_token'); }
function authHeaders() { return { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' }; }

async function init() {
    if (!getToken()) { window.location.href = 'index.html'; return; }
    await loadUnits();
    await loadData();
}

async function loadUnits() {
    const res = await fetch(`${API}/admin/units`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
    const data = await res.json();
    if (data.success) {
        units = data.units.filter(u => !u.parent_unit_id);
        const sel = document.getElementById('txn-unit');
        sel.innerHTML = '<option value="">Not unit-specific</option>' +
            units.map(u => `<option value="${u.id}">${u.unit_number || u.unit_name.slice(0,15)}</option>`).join('');
    }
}

async function loadData() {
    const res = await fetch(`${API}/admin/petty-cash`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
    const data = await res.json();
    if (data.success) {
        document.getElementById('balance').textContent = `MVR ${data.balance.toLocaleString('en-US', {minimumFractionDigits:2})}`;
        document.getElementById('total-in').textContent = `MVR ${data.total_in.toLocaleString('en-US', {minimumFractionDigits:2})}`;
        document.getElementById('total-out').textContent = `MVR ${data.total_out.toLocaleString('en-US', {minimumFractionDigits:2})}`;
        renderTransactions(data.transactions);
    }
}

function renderTransactions(transactions) {
    const list = document.getElementById('transactions-list');
    if (!transactions.length) { list.innerHTML = '<div class="empty">No transactions yet</div>'; return; }
    
    // Calculate running balance
    let runningBal = 0;
    const withBalance = [...transactions].reverse().map(t => {
        runningBal += t.type === 'in' ? parseFloat(t.amount) : -parseFloat(t.amount);
        return { ...t, runningBalance: runningBal };
    }).reverse();

    list.innerHTML = withBalance.map(t => {
        const date = new Date(t.transaction_date).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
        return `<div class="txn-item">
            <div class="txn-left">
                <div class="txn-dot ${t.type}">
                    <i class="fas fa-arrow-${t.type === 'in' ? 'down' : 'up'}"></i>
                </div>
                <div>
                    <div class="txn-desc">${t.description}</div>
                    <div class="txn-meta">${date}${t.unit_number ? ' · ' + t.unit_number : ''} · Balance: MVR ${t.runningBalance.toLocaleString('en-US', {minimumFractionDigits:2})}</div>
                </div>
            </div>
            <div style="display:flex;align-items:center;">
                <div class="txn-amount ${t.type}">${t.type === 'in' ? '+' : '-'} MVR ${parseFloat(t.amount).toLocaleString('en-US', {minimumFractionDigits:2})}</div>
                <button class="txn-delete" onclick="deleteTransaction(${t.id})"><i class="fas fa-trash"></i></button>
            </div>
        </div>`;
    }).join('');
}

function openModal(type) {
    document.getElementById('txn-type').value = type;
    document.getElementById('modal-title').textContent = type === 'in' ? 'Add Cash' : 'Record Expense';
    document.getElementById('txn-amount').value = '';
    document.getElementById('txn-desc').value = '';
    document.getElementById('txn-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('unit-group').style.display = type === 'in' ? 'block' : 'none';
    document.getElementById('txn-modal').classList.add('open');
}

function closeModal() { document.getElementById('txn-modal').classList.remove('open'); }

async function saveTransaction() {
    const amount = parseFloat(document.getElementById('txn-amount').value);
    const desc = document.getElementById('txn-desc').value.trim();
    if (!amount || !desc) { showToast('Amount and description required'); return; }
    try {
        const res = await fetch(`${API}/admin/petty-cash`, {
            method: 'POST', headers: authHeaders(),
            body: JSON.stringify({
                transaction_date: document.getElementById('txn-date').value,
                type: document.getElementById('txn-type').value,
                amount,
                description: desc,
                unit_id: document.getElementById('txn-unit').value || null
            })
        });
        const data = await res.json();
        if (data.success) { showToast('Saved!'); closeModal(); await loadData(); }
    } catch(e) { showToast('Error saving'); }
}

async function deleteTransaction(id) {
    if (!confirm('Delete this transaction?')) return;
    const res = await fetch(`${API}/admin/petty-cash/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${getToken()}` } });
    const data = await res.json();
    if (data.success) { showToast('Deleted'); await loadData(); }
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

init();
function logout() { localStorage.clear(); window.location.href = 'index.html'; }

document.addEventListener('DOMContentLoaded', () => {
  const n = localStorage.getItem('rc_tenant_name');
  const u = localStorage.getItem('rc_username');
  if (document.getElementById('tenant-name')) document.getElementById('tenant-name').textContent = n || '';
  if (document.getElementById('sidebar-username')) document.getElementById('sidebar-username').textContent = u || '';
});
</script>
</body>
</html>
