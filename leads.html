<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTM Rentals | Leads</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --navy: #0A2540; --ocean: #006994; --turquoise: #40B5AD; --gray-light: #F8F9FA; --gray-border: #E5E5E5; --gray-text: #6C757D; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --radius-lg: 20px; --radius-md: 12px; --radius-sm: 8px; --shadow: 0 2px 12px rgba(0,0,0,0.06); }
        body { font-family: 'Inter', sans-serif; background: #F0F2F5; min-height: 100vh; }
        .header { background: white; border-bottom: 1px solid var(--gray-border); padding: 0 24px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
        .header-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; height: 60px; gap: 12px; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: var(--navy); }
        .back-link { display: flex; align-items: center; gap: 6px; color: var(--ocean); text-decoration: none; font-size: 0.85rem; font-weight: 500; padding: 6px 14px; border: 1px solid var(--ocean); border-radius: 40px; transition: all 0.2s; }
        .back-link:hover { background: var(--ocean); color: white; }
        .main { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        @media (max-width: 600px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } }
        .stat-card { background: white; border-radius: var(--radius-md); padding: 16px; box-shadow: var(--shadow); border-left: 4px solid var(--gray-border); }
        .stat-card.total { border-left-color: var(--ocean); }
        .stat-card.today { border-left-color: var(--warning); }
        .stat-card.old { border-left-color: var(--danger); }
        .stat-val { font-size: 1.6rem; font-weight: 700; color: var(--navy); }
        .stat-lbl { font-size: 11px; color: var(--gray-text); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
        .filters-card { background: white; border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
        .filters-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
        .filter-group { flex: 1; min-width: 130px; }
        .filter-group label { display: block; font-size: 11px; font-weight: 600; color: var(--gray-text); margin-bottom: 4px; text-transform: uppercase; }
        .filter-group input, .filter-group select { width: 100%; padding: 8px 12px; border: 1.5px solid var(--gray-border); border-radius: var(--radius-sm); font-size: 13px; font-family: 'Inter', sans-serif; }
        .filter-group input:focus, .filter-group select:focus { outline: none; border-color: var(--turquoise); }
        .btn-clear { padding: 8px 16px; border: 1px solid var(--gray-border); border-radius: var(--radius-sm); background: var(--gray-light); color: var(--gray-text); font-weight: 600; cursor: pointer; font-size: 12px; align-self: flex-end; }
        .table-card { background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow: hidden; }
        .table-header { padding: 16px 20px; border-bottom: 1px solid var(--gray-border); display: flex; justify-content: space-between; align-items: center; }
        .table-header h3 { font-size: 0.95rem; font-weight: 600; color: var(--navy); }
        .table-count { font-size: 12px; color: var(--gray-text); }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--gray-text); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--gray-border); background: var(--gray-light); }
        td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid var(--gray-border); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(64,181,173,0.03); }
        .guest-name { font-weight: 600; color: var(--navy); }
        .guest-sub { font-size: 11px; color: var(--gray-text); margin-top: 2px; }
        .unit-badge { background: var(--gray-light); color: var(--navy); padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .days-badge { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .days-fresh { background: #D4EDDA; color: #155724; }
        .days-warm { background: #FFF3CD; color: #856404; }
        .days-cold { background: #F8D7DA; color: #721C24; }
        .action-btn { padding: 5px 10px; border: none; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-right: 4px; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
        .btn-call { background: #D4EDDA; color: #155724; }
        .btn-call:hover { background: var(--success); color: white; }
        .btn-whatsapp { background: #d4f5e0; color: #128C7E; }
        .btn-whatsapp:hover { background: #25D366; color: white; }
        .btn-convert { background: #CCE5FF; color: #004085; }
        .btn-convert:hover { background: var(--ocean); color: white; }
        .btn-delete { background: #F8D7DA; color: #721C24; }
        .btn-delete:hover { background: var(--danger); color: white; }
        .mobile-cards { display: none; padding: 12px; gap: 12px; flex-direction: column; }
        .lead-card { background: white; border-radius: var(--radius-md); padding: 16px; box-shadow: var(--shadow); border-left: 4px solid var(--warning); }
        .lc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .lc-name { font-weight: 700; font-size: 15px; color: var(--navy); }
        .lc-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--gray-text); margin-bottom: 6px; }
        .lc-row i { color: var(--turquoise); width: 16px; font-size: 12px; }
        .lc-actions { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--navy); color: white; padding: 12px 24px; border-radius: 40px; font-size: 13px; font-weight: 500; transition: transform 0.3s; z-index: 2000; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-text); }
        .empty-state i { font-size: 2.5rem; opacity: 0.3; display: block; margin-bottom: 12px; }
        @media (max-width: 768px) { .table-card .table-wrap { display: none; } .mobile-cards { display: flex; } }
    </style>
</head>
<body>
<div class="header">
    <div class="header-inner">
        <h1><i class="fas fa-user-clock" style="color:var(--warning);margin-right:8px;font-size:1rem;"></i>Leads</h1>
        <a href="admin.html" class="back-link"><i class="fas fa-arrow-left"></i> Dashboard</a>
    </div>
</div>
<div class="main">
    <div class="stats-grid">
        <div class="stat-card total"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Total Leads</div></div>
        <div class="stat-card today"><div class="stat-val" id="stat-today">—</div><div class="stat-lbl">Today</div></div>
        <div class="stat-card old"><div class="stat-val" id="stat-old">—</div><div class="stat-lbl">Over 24h</div></div>
    </div>
    <div class="filters-card">
        <div class="filters-row">
            <div class="filter-group" style="flex:2;">
                <label>Search</label>
                <input type="text" id="search-input" placeholder="Name or phone..." oninput="applyFilters()">
            </div>
            <div class="filter-group">
                <label>Unit</label>
                <select id="unit-filter" onchange="applyFilters()"><option value="">All Units</option></select>
            </div>
            <button class="btn-clear" onclick="clearFilters()">Clear</button>
        </div>
    </div>
    <div class="table-card">
        <div class="table-header">
            <h3>All Leads</h3>
            <span class="table-count" id="lead-count">Loading...</span>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Guest</th><th>Unit</th><th>Dates</th><th>Amount</th><th>Age</th><th>Actions</th></tr></thead>
                <tbody id="leads-tbody"><tr><td colspan="6" style="text-align:center;padding:40px;color:var(--gray-text);">Loading...</td></tr></tbody>
            </table>
        </div>
        <div class="mobile-cards" id="mobile-cards"><div style="text-align:center;padding:40px;color:var(--gray-text);">Loading...</div></div>
    </div>
</div>
<div class="toast" id="toast"></div>
<script>
    if (!localStorage.getItem('rc_token')) window.location.href = 'index.html';
    const API = 'https://api.htmrentals.com/api';
    const tkn = () => localStorage.getItem('rc_token');
    const hdrs = () => ({ 'Authorization': `Bearer ${tkn()}`, 'Content-Type': 'application/json' });
    let allLeads = [], allUnits = [];

    async function init() { await Promise.all([loadLeads(), loadUnits()]); }

    async function loadLeads() {
        try {
            const res = await fetch(`${API}/admin/leads`, { headers: hdrs() });
            if (res.status === 401) { localStorage.removeItem('rc_token'); window.location.href = 'index.html'; return; }
            const data = await res.json();
            if (data.success) { allLeads = data.leads; updateStats(); applyFilters(); }
        } catch(e) { showToast('Failed to load leads', 'error'); }
    }

    async function loadUnits() {
        try {
            const res = await fetch(`${API}/admin/units`, { headers: hdrs() });
            const data = await res.json();
            if (data.success) {
                allUnits = data.units;
                const uf = document.getElementById('unit-filter');
                uf.innerHTML = '<option value="">All Units</option>' + allUnits.map(u => `<option value="${u.id}">${u.unit_number||u.unit_name.split('|')[1]?.trim()||u.unit_name.slice(0,20)}</option>`).join('');
            }
        } catch(e) {}
    }

    function daysSince(dateStr) {
        return Math.floor((new Date() - new Date(dateStr)) / 86400000);
    }

    function updateStats() {
        const now = new Date();
        const today = allLeads.filter(l => daysSince(l.created_at) === 0).length;
        const old = allLeads.filter(l => daysSince(l.created_at) > 1).length;
        document.getElementById('stat-total').textContent = allLeads.length;
        document.getElementById('stat-today').textContent = today;
        document.getElementById('stat-old').textContent = old;
    }

    function applyFilters() {
        const search = document.getElementById('search-input').value.toLowerCase();
        const unit = document.getElementById('unit-filter').value;
        let f = allLeads.filter(l => {
            if (unit && l.unit_id != unit) return false;
            if (search && !l.guest_name?.toLowerCase().includes(search) && !(l.guest_phone||'').includes(search)) return false;
            return true;
        });
        document.getElementById('lead-count').textContent = `${f.length} lead${f.length!==1?'s':''}`;
        renderTable(f); renderMobile(f);
    }

    function clearFilters() {
        document.getElementById('search-input').value = '';
        document.getElementById('unit-filter').value = '';
        applyFilters();
    }

    function fmt(d) { if (!d) return '—'; return new Date(d.slice(0,10)+'T12:00:00').toLocaleDateString('en-US',{day:'numeric',month:'short',year:'numeric'}); }
    function esc(s) { return (s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    function ageBadge(createdAt) {
        const days = daysSince(createdAt);
        const hrs = Math.floor((new Date() - new Date(createdAt)) / 3600000);
        if (days === 0) return `<span class="days-badge days-fresh">${hrs}h ago</span>`;
        if (days === 1) return `<span class="days-badge days-warm">Yesterday</span>`;
        return `<span class="days-badge days-cold">${days} days ago</span>`;
    }

    function renderTable(leads) {
        const tbody = document.getElementById('leads-tbody');
        if (!leads.length) { tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="fas fa-user-check"></i><p>No leads yet</p></div></td></tr>`; return; }
        tbody.innerHTML = leads.map(l => {
            const ul = l.unit_number || l.unit_name?.split('|')[1]?.trim() || '—';
            const amt = `${l.currency||'MVR'} ${parseFloat(l.total_amount||0).toFixed(2)}`;
            return `<tr>
                <td><div class="guest-name">${esc(l.guest_name)}</div><div class="guest-sub">${esc(l.guest_phone||'')}${l.guest_email?' · '+esc(l.guest_email):''}</div></td>
                <td><span class="unit-badge">${esc(ul)}</span></td>
                <td style="font-size:12px;">${fmt(l.check_in_date)} → ${fmt(l.check_out_date)}<br><span style="color:var(--gray-text);">${l.total_nights||'?'} nights</span></td>
                <td><strong>${amt}</strong></td>
                <td>${ageBadge(l.created_at)}</td>
                <td>
                    <a class="action-btn btn-call" href="tel:${l.guest_phone}"><i class="fas fa-phone"></i> Call</a>
                    <a class="action-btn btn-whatsapp" href="https://wa.me/${(l.guest_phone||'').replace(/[^0-9]/g,'')}" target="_blank"><i class="fab fa-whatsapp"></i></a>
                    <button class="action-btn btn-convert" onclick="convertLead(${l.id})"><i class="fas fa-check"></i> Convert</button>
                    <button class="action-btn btn-delete" onclick="deleteLead(${l.id})"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        }).join('');
    }

    function renderMobile(leads) {
        const c = document.getElementById('mobile-cards');
        if (!leads.length) { c.innerHTML = `<div class="empty-state"><i class="fas fa-user-check"></i><p>No leads yet</p></div>`; return; }
        c.innerHTML = leads.map(l => {
            const ul = l.unit_number || l.unit_name?.split('|')[1]?.trim() || '—';
            const amt = `${l.currency||'MVR'} ${parseFloat(l.total_amount||0).toFixed(2)}`;
            return `<div class="lead-card">
                <div class="lc-header"><div><div class="lc-name">${esc(l.guest_name)}</div><div style="margin-top:4px;">${ageBadge(l.created_at)}</div></div><strong>${amt}</strong></div>
                <div class="lc-row"><i class="fas fa-phone"></i><span>${esc(l.guest_phone||'—')}</span></div>
                <div class="lc-row"><i class="fas fa-building"></i><span>${esc(ul)}</span></div>
                <div class="lc-row"><i class="fas fa-calendar-alt"></i><span>${fmt(l.check_in_date)} → ${fmt(l.check_out_date)} · ${l.total_nights||'?'} nights</span></div>
                ${l.special_requests?`<div class="lc-row"><i class="fas fa-comment"></i><span style="font-size:12px;">${esc(l.special_requests)}</span></div>`:''}
                <div class="lc-actions">
                    <a class="action-btn btn-call" href="tel:${l.guest_phone}"><i class="fas fa-phone"></i> Call</a>
                    <a class="action-btn btn-whatsapp" href="https://wa.me/${(l.guest_phone||'').replace(/[^0-9]/g,'')}" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                    <button class="action-btn btn-convert" onclick="convertLead(${l.id})"><i class="fas fa-check"></i> Convert to Booking</button>
                    <button class="action-btn btn-delete" onclick="deleteLead(${l.id})"><i class="fas fa-trash"></i> Delete</button>
                </div>
            </div>`;
        }).join('');
    }

    async function convertLead(id) {
        if (!confirm('Convert this lead to a pending booking?')) return;
        try {
            const res = await fetch(`${API}/admin/leads/${id}/convert`, { method: 'PATCH', headers: hdrs() });
            const data = await res.json();
            if (data.success) { showToast('Lead converted to booking', 'success'); await loadLeads(); }
            else showToast(data.error||'Failed', 'error');
        } catch(e) { showToast('Error', 'error'); }
    }

    async function deleteLead(id) {
        if (!confirm('Delete this lead permanently?')) return;
        try {
            const res = await fetch(`${API}/admin/leads/${id}`, { method: 'DELETE', headers: hdrs() });
            if (res.ok) { showToast('Lead deleted', 'success'); await loadLeads(); }
            else showToast('Failed', 'error');
        } catch(e) { showToast('Error', 'error'); }
    }

    function showToast(msg, type='') { const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast ${type} show`; setTimeout(()=>t.className='toast',3000); }

    init();
function logout() { localStorage.clear(); window.location.href = 'index.html'; }

document.addEventListener('DOMContentLoaded', () => {
  const n = localStorage.getItem('rc_tenant_name');
  const u = localStorage.getItem('rc_username');
  if (document.getElementById('tenant-name')) document.getElementById('tenant-name').textContent = n || '';
  if (document.getElementById('sidebar-username')) document.getElementById('sidebar-username').textContent = u || '';
});
</script>
</body>
</html>
