<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rental Connect — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --navy: #0A2540;
    --teal: #40B5AD;
    --gold: #B8975A;
    --white: #FAFAF8;
    --gray: #f4f5f7;
    --border: #e5e7eb;
    --text: #1C1C1E;
    --text-muted: #6b7280;
}
body { font-family: 'Inter', sans-serif; background: var(--navy); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-wrap { width: 100%; max-width: 420px; padding: 24px; }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo h1 { font-family: 'Playfair Display', serif; color: white; font-size: 1.8rem; }
.login-logo p { color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
.login-card { background: white; border-radius: 16px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.login-card h2 { font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.login-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
.form-group input:focus { border-color: var(--teal); }
.btn-login { width: 100%; padding: 13px; background: var(--navy); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
.btn-login:hover { background: #0d2f52; }
.error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
.powered { text-align: center; margin-top: 20px; font-size: 11px; color: rgba(255,255,255,0.3); }
.powered span { color: var(--teal); }
</style>
</head>
<body>
<div class="login-wrap">
    <div class="login-logo">
        <h1>Rental Connect</h1>
        <p>Property Management</p>
    </div>
    <div class="login-card">
        <h2>Welcome back</h2>
        <p>Sign in to your property dashboard</p>
        <div class="error-msg" id="error-msg"></div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username" autocomplete="username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
        </div>
        <button class="btn-login" onclick="login()">Sign In</button>
    </div>
    <div class="powered">Powered by <span>Rental Connect</span></div>
</div>
<script>
const API = 'https://api.htmrentals.com/api';

async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';

    if (!username || !password) {
        errEl.textContent = 'Please enter username and password.';
        errEl.style.display = 'block';
        return;
    }

    try {
        const res = await fetch(API + '/rental-connect/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
            localStorage.setItem('rc_token', data.token);
            localStorage.setItem('rc_username', data.username);
            localStorage.setItem('rc_tenant_id', data.tenant_id);
            localStorage.setItem('rc_plan', data.plan || 'guesthouse');
            localStorage.setItem('rc_tenant_name', data.tenant_name || '');
            localStorage.setItem('rc_features', JSON.stringify(data.features || []));
            window.location.href = 'dashboard.html';
        } else {
            errEl.textContent = data.error || 'Invalid credentials.';
            errEl.style.display = 'block';
        }
    } catch(e) {
        errEl.textContent = 'Connection error. Please try again.';
        errEl.style.display = 'block';
    }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

// Redirect if already logged in
if (localStorage.getItem('rc_token')) window.location.href = 'dashboard.html';
</script>
</body>
</html>
